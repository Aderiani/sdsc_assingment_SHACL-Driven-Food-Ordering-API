<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dish Ordering</title>
    <style>
      :root {
        color-scheme: light;
        --cream: #f7f2ea;
        --cream-strong: #efe3d3;
        --ink: #23312b;
        --muted: #6f7b74;
        --accent: #b36b45;
        --border: #d8c8b5;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
        background: linear-gradient(135deg, var(--cream), #fcf8f3);
        color: var(--ink);
      }

      .page {
        max-width: 860px;
        margin: 0 auto;
        padding: 48px 20px 80px;
      }

      .card {
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 18px 55px rgba(35, 49, 43, 0.08);
        backdrop-filter: blur(8px);
        padding: 32px;
      }

      .eyebrow {
        text-transform: uppercase;
        letter-spacing: 0.24em;
        font-size: 0.75rem;
        color: var(--accent);
        margin-bottom: 10px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 4vw, 2.8rem);
        line-height: 1.05;
      }

      p {
        color: var(--muted);
        line-height: 1.6;
      }

      .controls {
        display: grid;
        gap: 16px;
        margin: 24px 0 28px;
      }

      label {
        display: flex;
        flex-direction: column;
        gap: 8px;
        font-weight: 600;
        color: var(--ink);
      }

      select,
      input,
      textarea,
      button {
        font: inherit;
        border-radius: 12px;
        border: 1px solid var(--border);
        padding: 12px 14px;
        background: #fffdf8;
      }

      input:focus,
      textarea:focus,
      select:focus,
      button:focus {
        outline: 2px solid rgba(179, 107, 69, 0.28);
        outline-offset: 2px;
      }

      button {
        cursor: pointer;
        border: none;
        background: var(--accent);
        color: white;
        font-weight: 700;
        transition: transform 160ms ease, box-shadow 160ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 24px rgba(179, 107, 69, 0.2);
      }

      .status {
        padding: 14px 16px;
        border-radius: 14px;
        margin-top: 18px;
        border: 1px solid transparent;
      }

      .status.success {
        background: #ecf7ef;
        color: #2f5b3f;
        border-color: #b8dfc2;
      }

      .status.error {
        background: #fff1ef;
        color: #8b392d;
        border-color: #efc3b7;
      }

      .status.info {
        background: var(--cream-strong);
        color: var(--ink);
        border-color: var(--border);
      }

      .field-grid {
        display: grid;
        gap: 16px;
        margin-top: 16px;
      }

      .field-grid .field {
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: #fffdf9;
      }

      .field small {
        color: var(--muted);
      }

      .muted {
        color: var(--muted);
      }

      @media (max-width: 640px) {
        .card { padding: 24px; }
        .page { padding-top: 24px; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <div class="eyebrow">Calm ordering</div>
        <h1>Dish Ordering</h1>
        <p>Choose a dish, fill the form, and submit it for validation. The form is rendered from the backend schema, so it stays generic for every dish.</p>

        <div class="controls">
          <label>
            Choose a dish
            <select id="dishSelect"></select>
          </label>
        </div>

        <form id="orderForm" novalidate>
          <div id="fields" class="field-grid"></div>
          <button type="submit">Submit order</button>
        </form>

        <div id="status" class="status info" aria-live="polite">
          Loading dishes...
        </div>
      </section>
    </main>

    <script>
      const dishSelect = document.getElementById('dishSelect');
      const fieldsContainer = document.getElementById('fields');
      const orderForm = document.getElementById('orderForm');
      const status = document.getElementById('status');
      let currentSchema = null;

      function formatLabel(name) {
        return name
          .replace(/[_-]+/g, ' ')
          .replace(/\b\w/g, (char) => char.toUpperCase());
      }

      function showStatus(type, message) {
        status.className = `status ${type}`;
        status.textContent = message;
      }

      async function loadDishes() {
        try {
          const response = await fetch('/dishes');
          const dishes = await response.json();
          dishSelect.innerHTML = '';
          dishes.forEach((dish) => {
            const option = document.createElement('option');
            option.value = dish.id;
            option.textContent = dish.name;
            dishSelect.appendChild(option);
          });
          if (dishes.length) {
            await loadSchema(dishes[0].id);
          }
        } catch (error) {
          showStatus('error', 'Unable to load dishes right now.');
        }
      }

      async function loadSchema(dishId) {
        showStatus('info', 'Loading form...');
        try {
          const response = await fetch(`/dishes/${dishId}/schema`);
          const schema = await response.json();
          currentSchema = schema;
          renderFields(schema.fields);
          showStatus('info', `${schema.title || 'Dish'} form ready.`);
        } catch (error) {
          showStatus('error', 'Unable to load the selected dish form.');
        }
      }

      function renderFields(fields) {
        fieldsContainer.innerHTML = '';
        fields.forEach((field) => {
          const wrapper = document.createElement('div');
          wrapper.className = 'field';

          const label = document.createElement('label');
          label.setAttribute('for', field.name);
          label.textContent = formatLabel(field.name);

          const help = document.createElement('small');
          help.textContent = field.required ? 'Required' : 'Optional';
          label.appendChild(help);

          let input;
          if (field.enum && field.enum.length) {
            input = document.createElement('select');
            const emptyOption = document.createElement('option');
            emptyOption.value = '';
            emptyOption.textContent = 'Choose one';
            input.appendChild(emptyOption);
            field.enum.forEach((value) => {
              const option = document.createElement('option');
              option.value = value;
              option.textContent = value;
              input.appendChild(option);
            });
          } else if (field.type === 'array') {
            input = document.createElement('textarea');
            input.rows = 3;
            input.placeholder = 'Separate values with commas';
          } else if (field.type === 'integer') {
            input = document.createElement('input');
            input.type = 'number';
            input.step = '1';
          } else if (field.type === 'boolean') {
            input = document.createElement('input');
            input.type = 'checkbox';
          } else {
            input = document.createElement('input');
            input.type = 'text';
          }

          input.id = field.name;
          input.name = field.name;
          input.required = Boolean(field.required);
          wrapper.appendChild(label);
          wrapper.appendChild(input);
          fieldsContainer.appendChild(wrapper);
        });
      }

      function collectPayload() {
        const payload = {};
        const inputs = orderForm.querySelectorAll('input, select, textarea');
        inputs.forEach((element) => {
          if (!element.name) return;
          const value = element.value;
          const field = currentSchema?.fields.find((item) => item.name === element.name);
          if (!field) return;
          if (field.type === 'array') {
            payload[element.name] = value
              .split(',')
              .map((item) => item.trim())
              .filter(Boolean);
          } else if (field.type === 'integer' && value !== '') {
            payload[element.name] = Number(value);
          } else if (field.type === 'boolean') {
            payload[element.name] = element.checked;
          } else if (value !== '') {
            payload[element.name] = value;
          }
        });
        return payload;
      }

      orderForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        if (!currentSchema) {
          showStatus('error', 'No dish selected.');
          return;
        }

        const payload = collectPayload();
        showStatus('info', 'Submitting order...');

        try {
          const response = await fetch(`/dishes/${dishSelect.value}/order`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const result = await response.json();

          if (response.ok && result.valid) {
            showStatus('success', 'Order submitted successfully.');
            orderForm.reset();
          } else {
            const details = result.errors || [];
            const message = details.length
              ? details.map((item) => `${item.field}: ${item.message}`).join(' • ')
              : 'Validation failed.';
            showStatus('error', message);
          }
        } catch (error) {
          showStatus('error', 'Submission failed. Please try again.');
        }
      });

      dishSelect.addEventListener('change', (event) => {
        loadSchema(event.target.value);
      });

      loadDishes();
    </script>
  </body>
</html>
